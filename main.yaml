  - name: copy the mango repo
    copy: 
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo
  - name: install the mongodb
    package:
      name: mongodb-org
      state: present
  - name: allow remote connections
    replace: 
      path: /etc/mongod.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'
  - name: start and enable connection
    service: 
      name: mongod
      state: started
      enabled: yes